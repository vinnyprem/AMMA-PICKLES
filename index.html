<!DOCTYPE html>
<html>
<head>
<title>Swaroop's Pickles</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fff7f0;
}

/* HEADER */
.header {
    background: linear-gradient(45deg,#bf360c,#ff7043);
    color: white;
    text-align: center;
    padding: 25px;
    font-size: 30px;
    font-weight: bold;
}

/* FORM */
.form-box {
    background: white;
    margin: 20px auto;
    width: 90%;
    max-width: 500px;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

input {
    width: 95%;
    padding: 10px;
    margin: 8px;
}

/* PRODUCTS */
h2 {
    text-align: center;
    color: #bf360c;
}

.container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.product {
    background: white;
    width: 260px;
    margin: 15px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 10px gray;
}

.product img {
    width: 100%;
    height: 170px;
    object-fit: cover;
}

.content {
    padding: 10px;
}

select, button {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
}

button {
    background: #25D366;
    color: white;
    border: none;
    font-weight: bold;
}

button:hover {
    background: #1ebd5a;
}
</style>

</head>

<body>

<div class="header">
🌶️ Swaroop's Pickles  
<br><small>Authentic Homemade Taste 😋</small>
</div>

<!-- CUSTOMER DETAILS -->
<div class="form-box">
<h3>Enter Your Details</h3>
<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="address" placeholder="Delivery Address">
</div>

<h2>🍗 Non-Veg Pickles</h2>

<div class="container">

<div class="product">
<img src="https://source.unsplash.com/400x300/?chicken,pickle,achar,indian">
<div class="content">
<h3>Chicken Pickle</h3>
<select id="chicken">
<option>250g - ₹250</option>
<option>500g - ₹500</option>
<option>1kg - ₹1000</option>
</select>
<button onclick="order('Chicken Pickle','chicken')">Order</button>
</div>
</div>

<div class="product">
<img src="https://source.unsplash.com/400x300/?spicy,chicken,pickle">
<div class="content">
<h3>Chicken Boneless</h3>
<select id="boneless">
<option>250g - ₹300</option>
<option>500g - ₹600</option>
<option>1kg - ₹1200</option>
</select>
<button onclick="order('Chicken Boneless','boneless')">Order</button>
</div>
</div>

<div class="product">
<img src="https://source.unsplash.com/400x300/?mutton,pickle,indian">
<div class="content">
<h3>Mutton Pickle</h3>
<select id="mutton">
<option>250g - ₹475</option>
<option>500g - ₹950</option>
<option>1kg - ₹1900</option>
</select>
<button onclick="order('Mutton Pickle','mutton')">Order</button>
</div>
</div>

<div class="product">
<img src="https://source.unsplash.com/400x300/?prawns,pickle,indian">
<div class="content">
<h3>Prawns Pickle</h3>
<select id="prawns">
<option>250g - ₹450</option>
<option>500g - ₹900</option>
<option>1kg - ₹1800</option>
</select>
<button onclick="order('Prawns Pickle','prawns')">Order</button>
</div>
</div>

</div>

<h2>🥭 Veg Pickles</h2>

<div class="container">

<div class="product">
<img src="https://source.unsplash.com/400x300/?mango,pickle,achar">
<div class="content">
<h3>Mango Pickle</h3>
<select id="mango">
<option>250g - ₹100</option>
<option>500g - ₹200</option>
<option>1kg - ₹350</option>
</select>
<button onclick="order('Mango Pickle','mango')">Order</button>
</div>
</div>

<div class="product">
<img src="https://source.unsplash.com/400x300/?gongura,pickle,indian">
<div class="content">
<h3>Gongura Pickle</h3>
<select id="gongura">
<option>250g - ₹100</option>
<option>500g - ₹200</option>
<option>1kg - ₹350</option>
</select>
<button onclick="order('Gongura Pickle','gongura')">Order</button>
</div>
</div>

<div class="product">
<img src="https://source.unsplash.com/400x300/?tomato,pickle,indian">
<div class="content">
<h3>Tomato Pickle</h3>
<select id="tomato">
<option>250g - ₹100</option>
<option>500g - ₹200</option>
<option>1kg - ₹350</option>
</select>
<button onclick="order('Tomato Pickle','tomato')">Order</button>
</div>
</div>

<div class="product">
<img src="https://source.unsplash.com/400x300/?chilli,pickle,indian">
<div class="content">
<h3>Red Chilli Pickle</h3>
<select id="chilli">
<option>250g - ₹100</option>
<option>500g - ₹200</option>
<option>1kg - ₹350</option>
</select>
<button onclick="order('Red Chilli Pickle','chilli')">Order</button>
</div>
</div>

<div class="product">
<img src="https://source.unsplash.com/400x300/?mint,pickle,indian">
<div class="content">
<h3>Pudina Pickle</h3>
<select id="pudina">
<option>250g - ₹100</option>
<option>500g - ₹200</option>
<option>1kg - ₹350</option>
</select>
<button onclick="order('Pudina Pickle','pudina')">Order</button>
</div>
</div>

<div class="product">
<img src="https://source.unsplash.com/400x300/?amla,pickle,indian">
<div class="content">
<h3>Usirikaya Pickle</h3>
<select id="usiri">
<option>250g - ₹100</option>
<option>500g - ₹200</option>
<option>1kg - ₹350</option>
</select>
<button onclick="order('Usirikaya Pickle','usiri')">Order</button>
</div>
</div>

</div>

<script>
function order(product,id){

var name=document.getElementById("name").value;
var phoneUser=document.getElementById("phone").value;
var address=document.getElementById("address").value;
var qty=document.getElementById(id).value;

if(name=="" || phoneUser=="" || address==""){
alert("Please fill all details");
return;
}

var msg="🛒 *NEW ORDER* %0A%0A"
+"👤 Name: "+name+"%0A"
+"📞 Phone: "+phoneUser+"%0A"
+"🏠 Address: "+address+"%0A%0A"
+"📦 Product: "+product+"%0A"
+"📏 Quantity: "+qty+"%0A%0A"
+"👉 Please confirm order";

var phone="917901091495";

window.open("https://wa.me/"+phone+"?text="+msg);
}
</script>

</body>
</html>
