<!DOCTYPE html><html>
<head>
    <title>Swaroop Pickles</title><style>
    body {
        font-family: Arial;
        background-color: #fff8e1;
        text-align: center;
    }

    h1 {
        color: #d84315;
    }

    .product {
        background: white;
        margin: 20px;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
        display: inline-block;
        width: 250px;
    }

    .container {
        background: white;
        width: 300px;
        margin: 30px auto;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 0px 10px gray;
    }

    input, select {
        width: 90%;
        padding: 8px;
        margin: 10px;
    }

    button {
        background-color: #ff5722;
        color: white;
        padding: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: #e64a19;
    }
</style>

</head><body><h1>🍯 Swaroop Pickles</h1>
<p>Order Your Favorite Pickle</p>

<!-- Products -->
<div class="product">
    <h2>🥭 Mango Pickle</h2>
    <p>Price: ₹250</p>
</div>

<div class="product">
    <h2>🌿 Gongura Pickle</h2>
    <p>Price: ₹250</p>
</div>

<div class="product">
    <h2>🧄 Garlic Pickle</h2>
    <p>Price: ₹250</p>
</div>

<!-- Order Form -->
<div class="container">

    <h2>Place Your Order</h2>

    <input type="text" id="name" placeholder="Enter your name">
    <input type="text" id="address" placeholder="Enter your address">
    <input type="text" id="phone" placeholder="Enter your phone number">

    <select id="product">
        <option>Mango Pickle</option>
        <option>Gongura Pickle</option>
        <option>Garlic Pickle</option>
    </select>

    <button onclick="placeOrder()">Order Now</button>

</div>

<script>
    function placeOrder() {
        let name = document.getElementById("name").value;
        let address = document.getElementById("address").value;
        let phone = document.getElementById("phone").value;
        let product = document.getElementById("product").value;

        // validation
        if(name === "" || address === "" || phone === "") {
            alert("Please fill all details");
            return;
        }

        // message
        let message = "🛒 *New Order* %0A%0A" +
                      "👤 Name: " + name + "%0A" +
                      "📦 Product: " + product + "%0A" +
                      "📍 Address: " + address + "%0A" +
                      "📞 Phone: " + phone;

        // 👉 PUT YOUR NUMBER HERE
        let whatsappNumber = "917901091495";

        let url = "https://wa.me/" + whatsappNumber + "?text=" + message;

        // open whatsapp
        window.open(url, "_blank");

        // user instruction
        alert("WhatsApp opened ✅\n\n👉 Please click SEND to place your order");
    }
</script>

</body>
</html>
